name: Docker Build & Push

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'deploy/dockerfiles/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/agentcoders

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: agent
            dockerfile: deploy/dockerfiles/Dockerfile.agent
          - image: jarvis
            dockerfile: deploy/dockerfiles/Dockerfile.jarvis
          - image: billing
            dockerfile: deploy/dockerfiles/Dockerfile.billing
          - image: gateway
            dockerfile: deploy/dockerfiles/Dockerfile.gateway
          - image: tenant-manager
            dockerfile: deploy/dockerfiles/Dockerfile.tenant-manager
          - image: dashboard
            dockerfile: deploy/dockerfiles/Dockerfile.dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
