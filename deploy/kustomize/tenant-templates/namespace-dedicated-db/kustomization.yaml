apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Template for namespace + dedicated DB isolation tier
# Includes everything from namespace-only PLUS dedicated Postgres + Redis

resources:
  - ../namespace-only/namespace.yaml
  - ../namespace-only/network-policy.yaml
  - ../namespace-only/resource-quota.yaml
  - ../namespace-only/rbac.yaml
  - dedicated-postgres.yaml
  - dedicated-redis.yaml
