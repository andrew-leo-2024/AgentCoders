apiVersion: v1
kind: ServiceAccount
metadata:
  name: jarvis
  namespace: TENANT_NAMESPACE
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jarvis-role
  namespace: TENANT_NAMESPACE
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps", "pods", "persistentvolumeclaims"]
    verbs: ["get", "list", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jarvis-rolebinding
  namespace: TENANT_NAMESPACE
subjects:
  - kind: ServiceAccount
    name: jarvis
    namespace: TENANT_NAMESPACE
roleRef:
  kind: Role
  name: jarvis-role
  apiGroup: rbac.authorization.k8s.io
