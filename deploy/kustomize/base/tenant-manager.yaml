apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-manager
  namespace: agent-shared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tenant-manager
  template:
    metadata:
      labels:
        app: tenant-manager
    spec:
      serviceAccountName: tenant-manager
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: db-migrate
          image: agentcoders/tenant-manager:latest
          command: ["node", "node_modules/@agentcoders/shared/dist/db/run-migrate-cli.js"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: connection-string
      containers:
        - name: tenant-manager
          image: agentcoders/tenant-manager:latest
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          ports:
            - containerPort: 8082
          env:
            - name: REDIS_URL
              value: redis://redis.agent-shared.svc.cluster.local:6379
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: connection-string
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: stripe-credentials
                  key: secret-key
            - name: K8S_IN_CLUSTER
              value: "true"
            - name: HEALTH_PORT
              value: "8082"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8082
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: tenant-manager
  namespace: agent-shared
spec:
  type: ClusterIP
  ports:
    - port: 8082
      targetPort: 8082
  selector:
    app: tenant-manager
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tenant-manager
  namespace: agent-shared
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tenant-manager
rules:
  - apiGroups: [""]
    resources: ["namespaces", "services", "configmaps", "secrets", "persistentvolumeclaims", "resourcequotas"]
    verbs: ["get", "list", "create", "update", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "create", "update", "delete", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "update", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tenant-manager
subjects:
  - kind: ServiceAccount
    name: tenant-manager
    namespace: agent-shared
roleRef:
  kind: ClusterRole
  name: tenant-manager
  apiGroup: rbac.authorization.k8s.io
