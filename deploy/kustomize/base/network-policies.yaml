# Default deny all ingress/egress in agent-shared namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: agent-shared
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow Postgres internal access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres
  namespace: agent-shared
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: agentcoders
      ports:
        - port: 5432
---
# Allow Redis internal access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis
  namespace: agent-shared
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: agentcoders
      ports:
        - port: 6379
---
# Allow billing-service health probes + API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-billing
  namespace: agent-shared
spec:
  podSelector:
    matchLabels:
      app: billing-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8081
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    # Stripe API
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
---
# Allow tenant-manager
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-tenant-manager
  namespace: agent-shared
spec:
  podSelector:
    matchLabels:
      app: tenant-manager
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8082
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    # K8s API + external
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
        - port: 6443
---
# Allow Telegram gateway egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-telegram-gateway
  namespace: agent-shared
spec:
  podSelector:
    matchLabels:
      app: telegram-gateway
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    # Telegram API
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
