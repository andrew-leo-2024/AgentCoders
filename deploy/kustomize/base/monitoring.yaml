# PodMonitor for Prometheus Operator — scrapes /metrics from all agentcoders pods
# Requires prometheus-operator CRDs installed in the cluster
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: agentcoders-pods
  namespace: agent-shared
  labels:
    app.kubernetes.io/part-of: agentcoders
spec:
  selector:
    matchLabels:
      app.kubernetes.io/part-of: agentcoders
  podMetricsEndpoints:
    - port: health
      path: /metrics
      interval: 30s
---
# ServiceMonitor for services with /metrics endpoint
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: agentcoders-services
  namespace: agent-shared
  labels:
    app.kubernetes.io/part-of: agentcoders
spec:
  selector:
    matchLabels:
      app.kubernetes.io/part-of: agentcoders
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
