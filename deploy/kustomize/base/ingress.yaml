apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentcoders-ingress
  namespace: agent-shared
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: app.agentcoders.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: tenant-manager
                port:
                  number: 8082
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port:
                  number: 80
