apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: agent-shared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
        app.kubernetes.io/part-of: agentcoders
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: billing
          image: agentcoders/billing-service:latest
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          ports:
            - name: health
              containerPort: 8081
          env:
            - name: REDIS_URL
              value: redis://redis.agent-shared.svc.cluster.local:6379
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: connection-string
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: stripe-credentials
                  key: secret-key
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: stripe-credentials
                  key: webhook-secret
            - name: HEALTH_PORT
              value: "8081"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
  namespace: agent-shared
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8081
      targetPort: 8081
  selector:
    app: billing-service
