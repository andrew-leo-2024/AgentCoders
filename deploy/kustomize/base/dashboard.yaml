apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: agent-shared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
        app.kubernetes.io/part-of: agentcoders
    spec:
      containers:
        - name: dashboard
          image: agentcoders/dashboard:latest
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: agent-shared
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: dashboard
